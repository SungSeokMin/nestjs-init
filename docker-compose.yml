version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: nestjs-init-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nestjs
      POSTGRES_PASSWORD: nestjs!@
      POSTGRES_DB: nestjs_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nestjs -d nestjs_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
