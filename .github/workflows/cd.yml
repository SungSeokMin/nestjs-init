name: CD

on:
  push:
    branches:
      - main
      - dev

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-init
  DOCKER_TAG: latest

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via AWS SSM
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          ENV_FILE=$(cat <<'EOF'
          NODE_ENV=production
          PORT=3000
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF
          )

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"echo '$ENV_FILE' > /app/.env.production\",
              \"docker stop nestjs-init || true\",
              \"docker rm nestjs-init || true\",
              \"docker pull ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}\",
              \"docker run -d --name nestjs-init --restart unless-stopped -p 3000:3000 --env-file /app/.env.production ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}\"
            ]" \
            --region ${{ secrets.AWS_REGION }}
